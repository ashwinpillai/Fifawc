services:
  - type: web
    name: fifa-wc-2026-bidding-pool
    runtime: node
    plan: starter
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
